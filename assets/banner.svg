<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="50%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>

    <!-- Block Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#1f6feb" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ab7df8" />
      <stop offset="100%" stop-color="#8957e5" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fb950" />
      <stop offset="100%" stop-color="#238636" />
    </linearGradient>

    <!-- Grid Patterns -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    </pattern>

    <!-- Text Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Abstract Geometric Pages & Attention Blocks -->
  <g transform="translate(850, 40)">
    <!-- Logical Pages (Left side in block) -->
    <rect x="0" y="20" width="80" height="60" rx="8" fill="url(#primaryGrad)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4s" repeatCount="indefinite" />
    </rect>
    <text x="40" y="55" fill="#ffffff" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">Logical 0</text>

    <rect x="0" y="100" width="80" height="60" rx="8" fill="url(#primaryGrad)" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite" />
    </rect>
    <text x="40" y="135" fill="#ffffff" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">Logical 1</text>

    <!-- Connections / Translation Arrow -->
    <path d="M 100 110 L 160 110" stroke="#ffffff" stroke-width="3" stroke-dasharray="6,6" fill="none" opacity="0.6">
      <animate attributeName="stroke-dashoffset" values="0;24" dur="2s" repeatCount="indefinite" />
    </path>

    <!-- Physical Tables -->
    <rect x="180" y="0" width="90" height="60" rx="8" fill="url(#accentGrad)" opacity="0.9">
      <animate attributeName="y" values="0;10;0" dur="5s" repeatCount="indefinite" />
    </rect>
    <text x="225" y="35" fill="#ffffff" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">VRAM Slot A</text>

    <rect x="180" y="80" width="90" height="60" rx="8" fill="url(#glowGrad)" opacity="0.9">
      <animate attributeName="y" values="80;70;80" dur="5s" repeatCount="indefinite" />
    </rect>
    <text x="225" y="115" fill="#ffffff" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">VRAM Slot B</text>

    <rect x="180" y="160" width="90" height="60" rx="8" fill="url(#primaryGrad)" opacity="0.7">
      <animate attributeName="y" values="160;170;160" dur="5s" repeatCount="indefinite" />
    </rect>
    <text x="225" y="195" fill="#ffffff" font-family="Segoe UI, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">VRAM Slot C</text>
  </g>

  <!-- Title & Description -->
  <g transform="translate(80, 100)">
    <text x="0" y="40" fill="#ffffff" font-family="Segoe UI, sans-serif" font-weight="900" font-size="48" letter-spacing="2" filter="url(#glow)">AWESOME PAGED ATTENTION</text>
    <text x="0" y="85" fill="#8b949e" font-family="Segoe UI, sans-serif" font-weight="500" font-size="20" letter-spacing="1">History, Evolution, Variants &amp; Applications of KV Cache Paging</text>
  </g>

  <!-- Decorative bottom border line -->
  <rect x="0" y="295" width="1200" height="5" fill="url(#primaryGrad)" />
</svg>
